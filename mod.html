<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mod Creator - Player & Team Editor</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial,sans-serif; background:#0a0e17; color:#d1d5db; min-height:100vh; }
    .header {
      background:#111827; padding:14px 20px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #1f2937;
    }
    .menu-toggle { font-size:1.8rem; cursor:pointer; color:#60a5fa; display:none; }
    .container { display:flex; height:calc(100vh - 60px); }
    .sidebar {
      width:260px; background:#111827; padding:20px; border-right:1px solid #1f2937; overflow-y:auto;
      transition:transform 0.3s ease; position:fixed; top:60px; left:0; bottom:0; z-index:1000;
    }
    .sidebar.active { transform:translateX(0); }
    .sidebar-header { display:flex; justify-content:space-between; margin-bottom:24px; }
    .sidebar h2 { color:#60a5fa; font-size:1.4rem; }
    .close-btn { background:none; border:none; color:#9ca3af; font-size:1.8rem; cursor:pointer; }
    .close-btn:hover { color:white; background:#374151; }
    .menu-item {
      padding:12px 16px; margin:8px 0; border-radius:8px; cursor:pointer; transition:all 0.2s;
    }
    .menu-item:hover, .menu-item.active { background:#1e40af; color:white; }
    .main-content {
      flex:1; padding:30px; overflow-y:auto; margin-left:260px; transition:margin-left 0.3s ease;
    }
    .section {
      background:#1f2937; padding:24px; border-radius:12px; margin-bottom:24px;
    }
    .form-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px;
    }
    label { display:block; margin-bottom:6px; font-weight:500; color:#9ca3af; }
    input, select {
      width:100%; padding:10px; background:#111827; border:1px solid #374151; border-radius:6px; color:white;
    }
    button {
      padding:12px 28px; background:linear-gradient(90deg,#3b82f6,#60a5fa); border:none;
      border-radius:8px; color:white; font-weight:bold; cursor:pointer; margin-top:16px;
    }
    button:hover { opacity:0.92; }
    #status, #teamStatus { margin-top:16px; font-weight:bold; text-align:center; min-height:24px; }

    @media (max-width:900px) {
      .menu-toggle { display:block; }
      .sidebar { transform:translateX(-100%); }
      .sidebar.active { transform:translateX(0); }
      .main-content { margin-left:0 !important; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="menu-toggle" id="menuToggle">☰</div>
    <h2>Mod Creator</h2>
    <div></div>
  </header>

  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Menu</h2>
        <button class="close-btn" id="closeSidebar">×</button>
      </div>
      <div class="menu-item active" data-tab="player">Player Editor</div>
      <div class="menu-item" data-tab="team">Team Editor</div>
    </aside>

    <main class="main-content">

      <!-- Player Editor -->
      <div id="player" class="tab-content active">
        <h2>Player Editor</h2>

        <form id="playerForm">

            <label>Team Name</label>

          </div>
          <div class="section">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter Name" required />
          </div>
          <div class="section">
            <label>Role</label>
            <select name="role" required>
              <option value="">Select Role</option>
              <option>Batsman</option>
              <option>Bowler</option>
              <option>All-rounder</option>
              <option>Wicket-keeper</option>
            </select>
          </div>
          <div class="section">
            <label>Hands</label>
            <div class="form-grid">
              <div><label>Bat</label><select name="batHand"><option>Right Bat</option><option>Left Bat</option></select></div>
              <div><label>Bowl</label><select name="bowlHand"><option>Right Bowl</option><option>Left Bowl</option></select></div>
            </div>
          </div>
          <div class="section">
            <label>Bowling Type</label>
            <select name="bowlingType">

              <option>Fast</option>
              <option>Medium-Fast</option>
              <option>Medium</option>
              <option>Off-Spin</option>
              <option>Leg-Spin</option>
              <option>Fast-Medium</option>
            </select>
          </div>
          <div class="section">
            <label>Face</label>
            <div class="face-options">

              <label><input type="radio" name="faceType" value="Custom"> Custom</label>
            </div>
            <div id="presetFaceBlock">
              <label>Select Face Preset (1-80)</label>

    <option value="24">Preset 24</option>

    <option value="80">Preset 80</option>
</select>
              </select>
            </div>
            <div id="customFaceBlock" style="display:none; margin-top:12px;">
              <label>Upload Custom Face</label>
              <input type="file" name="faceFile" accept="image/*" />
            </div>
          </div>
          <div class="section">
            <label>Batting Skill</label>
            <select name="battingSkill" required>
              <option>None</option>
              <option>Defensive</option>
              <option>Ridical</option>
              <option>Brut</option>
              <option>Blanced</option>
            </select>
            <div class="form-grid" style="margin-top:16px;">
              <div><label>Timing </label><input type="number" name="timing" min="0" max="99" value="" required /></div>
              <div><label>Aggression </label><input type="number" name="aggression" min="0" max="99" value="" required /></div>
              <div><label>Technique </label><input type="number" name="technique" min="0" max="99" value="" required /></div>
            </div>
          </div>
          <div class="section">
            <label>Jersey Number</label>
            <input type="number" name="jersey" min="0" max="99" value="" required />
          </div>
          <button type="submit">Submit Request / ADD</button>
          <div id="status"></div>
        </form>
      </div>

      <!-- Team Editor -->
      <div id="team" class="tab-content" style="display:none;">
        <h2>Team Editor</h2>

        <form id="teamForm">
          <div class="section">
            <div class="form-grid">
              <div>
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="e.g. Stark Warriors FC" required />
              </div>
              <div>
                <label>Short Name</label>
                <input type="text" name="shortName" placeholder="e.g. SWFC" maxlength="5" required />
              </div>
              <div>
                <label>Jersey Design / Colour (Upload Image)</label>
                <input type="file" name="jerseyImage" accept="image/*" />
              </div>
              <div>
                <label>Team Logo</label>
                <input type="file" name="logo" accept="image/*" />
              </div>
            </div>
          </div>

          <button type="submit">submit</button>
          <div id="teamStatus"></div>
        </form>
      </div>

    </main>
  </div>

  <script>
    // Sidebar control
    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.add('active');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('active');

    // Tab switching
    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(item.dataset.tab).style.display = 'block';
        if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('active');
      };
    });

    // Player Submit → Telegram
    document.getElementById('playerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const status = document.getElementById('status');
      status.textContent = 'Opening Telegram...';
      status.style.color = '#60a5fa';

      const formData = new FormData(e.target);

      let msg = '🏏 New Player Request\n\n';
      msg += `Team: ${formData.get('teamName') || 'N/A'}\n`;
      msg += `Name: ${formData.get('name') || 'N/A'}\n`;
      msg += `Role: ${formData.get('role') || 'N/A'}\n`;
      msg += `Hands: Bat → ${formData.get('batHand') || 'N/A'} | Bowl → ${formData.get('bowlHand') || 'N/A'}\n`;
      msg += `Bowling Type: ${formData.get('bowlingType') || 'None'}\n`;
      msg += `Face: ${formData.get('faceType') || 'Preset'}\n`;

      if (formData.get('faceType') === 'Preset') {
        msg += `Preset Face ID: ${formData.get('presetFaceId') || 'Not selected'}\n`;
      } else {
        msg += `Custom Face: ${formData.get('faceFile')?.name ? 'Uploaded' : 'None'}\n`;
      }

      msg += `Batting Skill: ${formData.get('battingSkill') || 'N/A'}\n`;
      msg += `Timing: ${formData.get('timing') || '0'}/99\n`;
      msg += `Aggression: ${formData.get('aggression') || '0'}/99\n`;
      msg += `Technique: ${formData.get('technique') || '0'}/99\n`;
      msg += `Jersey Number: ${formData.get('jersey') || '0'}\n\n`;
      msg += 'Submitted from Mod Creator 🔥';

      const encodedMsg = encodeURIComponent(msg);
      window.open(`https://t.me/itzdreammods?text=${encodedMsg}`, '_blank');

      status.textContent = 'Telegram opened! Review & send.';
      status.style.color = '#10b981';
    });

    // Team ADD → Telegram
    document.getElementById('teamForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const status = document.getElementById('teamStatus');
      status.textContent = 'Opening Telegram...';
      status.style.color = '#60a5fa';

      const formData = new FormData(e.target);

      let msg = '🏟 New Team Request\n\n';
      msg += `Full Name: ${formData.get('fullName') || 'N/A'}\n`;
      msg += `Short Name: ${formData.get('shortName') || 'N/A'}\n`;
      msg += `Jersey Design/Colour Image: ${formData.get('jerseyImage')?.name ? 'Uploaded' : 'None'}\n`;
      msg += `Team Logo: ${formData.get('logo')?.name ? 'Uploaded' : 'None'}\n\n`;
      msg += 'Submitted from Team Editor its Paid lifetime use only on 10 RS 🔥';

      const encodedMsg = encodeURIComponent(msg);
      window.open(`https://t.me/itzdreammods?text=${encodedMsg}`, '_blank');

      status.textContent = 'ITS Paid lifetime time access only on 10 Rs';
      status.style.color = '#10b981';
    });
  </script>

</body>
</html>
