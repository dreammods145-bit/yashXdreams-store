<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DREAM STORE | Premium Cricket Mods</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root { 
      --bg: #0b0d13; 
      --card: #1c1f26; 
      --accent: #38bdf8; 
      --text: #e2e8f0; 
      --border: rgba(255,255,255,0.08); 
      --menu-bg: rgba(10, 12, 18, 0.85);
    }

    body.light-theme {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --border: rgba(0,0,0,0.1);
      --menu-bg: rgba(255, 255, 255, 0.9);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.4s ease, color 0.4s ease; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
    header { position: sticky; top:0; display:flex; justify-content:space-between; align-items: center; padding:15px 25px; background:rgba(11, 13, 19, 0.7); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:1000; }
    .side-menu { position:fixed; left:-320px; top:0; width:300px; height: 100vh; background: var(--menu-bg); backdrop-filter: blur(40px); z-index:2000; padding:25px; border-right:1px solid var(--border); display: flex; flex-direction: column; transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .side-menu.open { left:0; box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
    .menu-content { margin-top: 40px; flex-grow: 1; }
    .side-menu a { display: flex; align-items: center; gap: 15px; color:var(--text); text-decoration:none; padding:16px 18px; margin-bottom:8px; border-radius:18px; font-weight: 600; }
    .side-menu a:hover { background: rgba(120, 120, 120, 0.1); transform: translateX(5px); }
    .side-footer { padding-top: 20px; border-top: 1px solid var(--border); }
    .hero { padding: 60px 20px 20px; text-align: center; }
    .hero h1 { font-size: 42px; font-weight: 900; }
    .search-box { max-width:500px; margin: 30px auto; padding:0 20px; }
    .search-input { width:100%; padding:18px 25px; border-radius:50px; background:var(--card); border:1px solid var(--border); color:var(--text); outline:none; }
    .mods { display:grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap:25px; padding:20px; max-width:1200px; margin:0 auto; }
    .card { background:var(--card); border-radius:32px; padding:20px; border:1px solid var(--border); animation: fadeInUp 0.7s ease-out backwards; }
    .app-icon { width: 64px; height: 64px; border-radius: 18px; object-fit: cover; }
    .screenshot { width:100%; border-radius: 20px; margin-bottom: 15px; aspect-ratio: 16/9; object-fit: cover; }
    .btn-main { width:100%; padding:18px; border-radius:20px; border:none; background: #3b82f6; color:white; font-weight:800; cursor:pointer; text-align: center; display: block; text-decoration: none; }
    .card:hover .btn-main { animation: pulse 1.5s infinite; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter: blur(15px); display:none; align-items:center; justify-content:center; z-index:5000; padding: 20px; }
    .auth-box { width:100%; max-width:400px; background:var(--card); padding:40px; border-radius:32px; border:1px solid var(--border); text-align:center; animation: fadeInUp 0.4s ease-out; }
    .input-group { margin-bottom:15px; position: relative; }
    .input-group input { width:100%; padding:15px; border-radius:14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); outline:none; }
    .password-wrapper { position: relative; width: 100%; }
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; }
  </style>
</head>
<body>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <header>
    <button style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer;" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
    <div style="font-weight: 900; font-size: 22px; color: var(--accent);">DREAM STORE</div>
    <button style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer;" onclick="toggleModal()"><i class="fa-solid fa-circle-user"></i></button>
  </header>

  <div id="sideMenu" class="side-menu">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 11px; font-weight: 800; opacity: 0.5;">NAVIGATION</span>
        <button style="background:none; border:none; color:var(--text); font-size: 24px;" onclick="toggleMenu()">×</button>
    </div>
    <div class="menu-content">
      <a href="#"><i class="fa-solid fa-house" style="color: #08FF00;"></i> <span>Home</span></a>
      <a href="mod.html"><i class="fa-solid fa-wrench" style="color: #FF0017;"></i> <span>Mod Creator</span></a>
      <a href="connect.html"><i class="fa-solid fa-envelope" style="color: #0800FF;"></i> <span>Contact</span></a>
    </div>
    <div class="side-footer">
      <a href="#" onclick="toggleMusic(); return false;" style="display:flex; align-items:center; gap:12px; margin-bottom:10px; text-decoration:none; color:var(--text);">
        <i id="musicIcon" class="fa-solid fa-volume-high" style="color:#22c55e; font-size:18px;"></i> 
        <span id="musicText" style="font-weight:700;">Music: ON</span>
      </a>
      <a href="#" onclick="updateTheme(); return false;" style="display:flex; align-items:center; gap:12px; margin-bottom:10px; text-decoration:none; color:var(--text);">
        <i id="themeIcon" class="fa-solid fa-moon" style="color:#facc15; font-size:20px;"></i> 
        <span id="themeText" style="font-weight:700;">Dark Mode</span>
      </a>
      <a href="profile.html" style="display:flex; align-items:center; gap:12px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px; text-decoration:none; color:var(--text);">
        <i class="fa-solid fa-circle-user" style="color:#ec4899; font-size: 20px;"></i> 
        <span id="displayUser" style="font-weight:800;">My Profile</span>
      </a>
    </div>
  </div>

  <section class="hero">
    <h1>DREAM STORE</h1>
    <p style="opacity: 0.6; margin-top: 10px;">The Ultimate Destination for Premium Mods.</p>
  </section>

  <div class="search-box">
    <input type="text" id="modSearch" class="search-input" placeholder="Search premium mods..." onkeyup="filterMods()">
  </div>

  <section class="mods" id="modsContainer">
    <!-- Mods will be loaded from localStorage dream_store_mods -->
  </section>

  <div id="authModal" class="modal">
    <div class="auth-box">
      <h2 style="font-weight: 800; margin-bottom: 20px;">Signup</h2>
      <div class="input-group">
        <input type="text" id="regUser" placeholder="Username">
      </div>
      <div class="input-group">
        <input type="email" id="regEmail" placeholder="Email Address">
      </div>
      <div class="input-group">
        <div class="password-wrapper">
          <input type="password" id="regPass" placeholder="Password">
          <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePass()"></i>
        </div>
      </div>
      <button class="btn-main" onclick="handleSignup()">SIGN UP</button>
      <p style="margin-top: 20px; font-size: 12px; cursor: pointer; opacity: 0.5;" onclick="toggleModal()">Close</p>
    </div>
  </div>

  <script>
    const audio = document.getElementById('bgMusic');
    const mIcon = document.getElementById('musicIcon');
    const mText = document.getElementById('musicText');

    window.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().catch(() => {});
        }
    }, { once: true });

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            mIcon.className = "fa-solid fa-volume-high";
            mIcon.style.color = "#22c55e";
            mText.innerText = "Music: ON";
        } else {
            audio.pause();
            mIcon.className = "fa-solid fa-volume-xmark";
            mIcon.style.color = "#ef4444";
            mText.innerText = "Music: OFF";
        }
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleModal() { 
      const m = document.getElementById('authModal');
      m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }
    function togglePass() {
      const p = document.getElementById('regPass');
      const i = document.getElementById('eyeIcon');
      if (p.type === 'password') {
        p.type = 'text';
        i.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        p.type = 'password';
        i.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // FIXED: Save user to allUsers array (so admin panel can see)
    function handleSignup() {
      const username = document.getElementById('regUser').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPass').value;

      if(!username || !email || !password) {
        alert("Please fill all fields!");
        return;
      }

      // Get existing users or create new array
      let allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
      
      // Optional: check duplicate
      if(allUsers.some(u => u.email === email)) {
        alert("Email already registered!");
        return;
      }

      // Add new user
      const newUser = {
        username: username,
        email: email,
        password: password,   // stored as plain text (for admin view only)
        timestamp: new Date().toLocaleString()
      };
      allUsers.push(newUser);
      localStorage.setItem("allUsers", JSON.stringify(allUsers));
      
      // Also keep legacy separate items for profile page
      localStorage.setItem('userName', username);
      localStorage.setItem('userEmail', email);

      document.getElementById('displayUser').innerText = username;
      alert("Signup Successful!");
      toggleModal();
    }

    function filterMods() {
      const input = document.getElementById('modSearch').value.toUpperCase();
      const cards = document.getElementsByClassName('card');
      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.app-title').innerText;
        cards[i].style.display = title.toUpperCase().includes(input) ? "" : "none";
      }
    }

    function applyTheme(theme) {
      const text = document.getElementById('themeText');
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        text.innerText = "Light Mode";
        icon.className = "fa-solid fa-sun";
      } else {
        document.body.classList.remove('light-theme');
        text.innerText = "Dark Mode";
        icon.className = "fa-solid fa-moon";
      }
    }

    function updateTheme() {
      const current = document.body.classList.contains('light-theme') ? 'dark' : 'light';
      localStorage.setItem('theme', current);
      applyTheme(current);
    }

    // Load store mods dynamically from localStorage
    function loadStoreMods() {
      let mods = localStorage.getItem("dream_store_mods");
      if(!mods) {
        const defaultMods = [{
          id: "mod1",
          title: "Cricket X 26",
          version: "v5.0 Official Patch",
          description: "Experience UHD graphics and real-face patches for Cricket X 26.",
          icon: "cx26_icon.png",
          screenshot: "cx26_screenshot1.jpg",
          downloadLink: "CX26.html"
        }];
        localStorage.setItem("dream_store_mods", JSON.stringify(defaultMods));
        mods = JSON.stringify(defaultMods);
      }
      const modsArray = JSON.parse(mods);
      const container = document.getElementById("modsContainer");
      if(container) {
        container.innerHTML = modsArray.map(mod => `
          <div class="card">
            <div class="card-header" style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
              <img src="${mod.icon || 'icon_cx26.png'}" class="app-icon" onerror="this.src='icon_cx26.png'">
              <div>
                <div class="app-title" style="font-size: 20px; font-weight: 800;">${mod.title}</div>
                <div style="font-size:12px; opacity:0.5;">${mod.version}</div>
              </div>
            </div>
            <img src="${mod.screenshot || 'https://images.unsplash.com/photo-1540747913346-19e3ad643121?w=800'}" class="screenshot" onerror="this.src='https://images.unsplash.com/photo-1540747913346-19e3ad643121?w=800'">
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 20px;">${mod.description}</p>
            <a href="${mod.downloadLink}" class="btn-main">Download Now</a>
          </div>
        `).join('');
      }
    }

    window.onload = () => {
      applyTheme(localStorage.getItem('theme') || 'dark');
      const savedUser = localStorage.getItem('userName');
      if(savedUser) document.getElementById('displayUser').innerText = savedUser;
      loadStoreMods();
    };
  </script>
</body>
</html>
