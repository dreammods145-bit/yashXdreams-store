<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>User Profile | Dream Store</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root {
  --bg: #05070a;
  --card: #0f111a;
  --accent: #38bdf8;
  --accent-glow: rgba(56, 189, 248, 0.2);
  --text: #f8fafc;
  --border: rgba(255, 255, 255, 0.08);
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', Segoe UI, sans-serif;
  background: radial-gradient(circle at top, #1a2338 0%, #05070a 100%);
  color: var(--text);
  min-height: 100vh;
}

.profile-container {
  max-width: 480px;
  margin: 40px auto;
  padding: 0 20px;
}

.profile-box {
  background: rgba(15, 17, 26, 0.8);
  backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 32px;
  border: 1px solid var(--border);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  text-align: center;
}

.avatar-wrapper {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto 20px;
}

.profile-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 3px solid var(--accent);
  padding: 5px;
  object-fit: cover;
  box-shadow: 0 0 20px var(--accent-glow);
}

.upload-label {
  position: absolute;
  bottom: 5px;
  right: 5px;
  background: var(--accent);
  color: #000;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  border: 3px solid var(--card);
}

#avatarInput { display: none; }

h2 {
  font-size: 28px;
  font-weight: 800;
  margin: 10px 0 25px;
  letter-spacing: -1px;
}

.info-grid {
  text-align: left;
  margin-bottom: 30px;
}

.info-card {
  background: rgba(255, 255, 255, 0.03);
  padding: 15px 20px;
  border-radius: 18px;
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.info-label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 1px;
}

.info-value {
  font-size: 16px;
  font-weight: 600;
  margin-top: 4px;
}

.menu-btn {
  display: block;
  text-decoration: none;
  background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
  color: #000;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 16px;
  font-weight: 800;
  transition: 0.3s;
}

.menu-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
}

.section-title {
  margin-top: 35px;
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  color: #64748b;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: "";
  height: 1px;
  background: var(--border);
  flex: 1;
}

.history-box {
  margin-top: 15px;
  max-height: 200px;
  overflow-y: auto;
}

.history-item {
  background: rgba(255, 255, 255, 0.02);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 10px;
  text-align: left;
  font-size: 14px;
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout-btn {
  background: transparent;
  border: 1px solid #ef4444;
  color: #ef4444;
  padding: 14px;
  width: 100%;
  border-radius: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
}

.logout-btn:hover {
  background: #ef4444;
  color: white;
}

.back-link {
  display: inline-block;
  color: #64748b;
  text-decoration: none;
  font-size: 14px;
  margin-bottom: 20px;
  font-weight: 600;
}

.back-link:hover { color: var(--accent); }

</style>
</head>
<body>

<div class="profile-container">
  <a href="index.html" class="back-link">← Back to Store</a>

  <div class="profile-box">
    <div class="avatar-wrapper">
      <img id="avatarPreview" class="profile-img" src="https://img.icons8.com/color/200/user.png">
      <label for="avatarInput" class="upload-label">✎</label>
      <input type="file" id="avatarInput" accept="image/*">
    </div>

    <h2>My Profile</h2>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Username</div>
        <div id="userName" class="info-value">Loading...</div>
      </div>
      <div class="info-card">
        <div class="info-label">Email Address</div>
        <div id="userEmail" class="info-value">Loading...</div>
      </div>
    </div>

    <a href="Mod.html" class="menu-btn">Open Mod Creator</a>

    <div class="section-title">Request History</div>
    <div class="history-box" id="historyList">
      <div class="history-item">No Requests Yet</div>
    </div>

    <button onclick="logout()" class="logout-btn">Sign Out</button>
  </div>
</div>

<script>
/* load user */
let name = localStorage.getItem("userName");
let email = localStorage.getItem("userEmail");

document.getElementById("userName").innerText = name || "Not Found";
document.getElementById("userEmail").innerText = email || "Not Found";

/* avatar */
let savedAvatar = localStorage.getItem("userAvatar");
if(savedAvatar) document.getElementById("avatarPreview").src = savedAvatar;

document.getElementById("avatarInput").addEventListener("change", function(){
  let file = this.files[0];
  if(!file) return;
  let reader = new FileReader();
  reader.onload = function(e){
    let img = e.target.result;
    document.getElementById("avatarPreview").src = img;
    localStorage.setItem("userAvatar", img);
  };
  reader.readAsDataURL(file);
});

/* request history */
let requests = JSON.parse(localStorage.getItem("requests")) || [];
let historyBox = document.getElementById("historyList");

if(requests.length > 0){
  historyBox.innerHTML = "";
  requests.forEach((req, i) => {
    historyBox.innerHTML += `
      <div class="history-item">
        <div>
          <span style="color:var(--accent)">#${i+1}</span> ${req.type || 'Mod'}<br>
          <small style="color:#64748b">${req.time || 'Recently'}</small>
        </div>
      </div>
    `;
  });
}

function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
